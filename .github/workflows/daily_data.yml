name: Daily Data Fetch

on:
  schedule:
    # Runs at 5:00 AM UTC every day
    - cron: '0 5 * * *'
  workflow_dispatch: {}  # allows manual triggering from the Actions tab

permissions:
  contents: write  # needed so the workflow can push a commit

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          enable-cache: true
          cache-dependency-glob: 'pyproject.toml'  # cache key based on this file's contents

      - name: Install dependencies
        run: uv sync  # reads pyproject.toml (and uv.lock, if present)

      - name: Fetch data
        env:
          OPEN_DATA_APP_TOKEN: ${{ secrets.OPEN_DATA_APP_TOKEN }}
        run: uv run python get_data.py

      - name: Summarize data
        run: uv run python summarize_data.py

      - name: Commit and push new data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add daily data $(date -u +'%Y-%m-%d')"
            git push
          fi